<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Luxury Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            background: var(--primary);
        }

        .auth-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            min-height: 100vh;
        }

        .auth-image {
            position: relative;
            overflow: hidden;
        }

        .auth-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .auth-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(26,26,46,0.95), rgba(26,26,46,0.85));
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-overlay h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            color: var(--white);
            margin-bottom: 20px;
        }

        .auth-overlay p {
            color: var(--gray-400);
            font-size: 16px;
            margin-bottom: 40px;
        }

        .auth-feature {
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--gray-300);
            font-size: 15px;
            margin-bottom: 18px;
        }

        .auth-feature .material-icons-round {
            font-size: 22px;
            color: var(--gold);
        }

        .auth-form-section {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            padding: 60px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
        }

        .auth-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--white);
            margin-bottom: 8px;
        }

        .auth-card > p {
            color: var(--gray-400);
            margin-bottom: 32px;
        }

        .form-group-luxury {
            margin-bottom: 20px;
        }

        .form-group-luxury label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-300);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .material-icons-round {
            position: absolute;
            left: 16px;
            font-size: 20px;
            color: var(--gray-500);
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            font-size: 15px;
            color: var(--white);
            font-family: inherit;
            transition: var(--transition);
        }

        .input-wrapper input::placeholder {
            color: var(--gray-500);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(201, 169, 98, 0.08);
        }

        .btn-luxury {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--primary);
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            transition: var(--transition);
        }

        .btn-luxury:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 169, 98, 0.45);
        }

        .auth-switch {
            text-align: center;
            color: var(--gray-400);
            font-size: 14px;
            margin-top: 24px;
        }

        .auth-switch a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }

        .back-home {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--gray-500);
            text-decoration: none;
            font-size: 14px;
            margin-top: 24px;
            transition: var(--transition);
        }

        .back-home:hover {
            color: var(--gold);
        }

        .back-home .material-icons-round {
            font-size: 18px;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.12);
            color: #fca5a5;
            padding: 16px;
            border-radius: var(--radius);
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid rgba(239, 68, 68, 0.25);
            display: none;
        }

        .admin-link-login {
            text-align: center;
            margin-top: 20px;
        }

        .admin-link-login a {
            color: var(--gray-500);
            text-decoration: none;
            font-size: 13px;
        }

        .admin-link-login a:hover {
            color: var(--gold);
        }

        @media (max-width: 1024px) {
            .auth-container {
                grid-template-columns: 1fr;
            }
            .auth-image {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <!-- Left Side - Image -->
            <div class="auth-image">
                <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1200" alt="Hotel">
                <div class="auth-overlay">
                    <h1>Welcome Back</h1>
                    <p>Sign in to manage your bookings and reservations.</p>
                    <div class="auth-feature">
                        <span class="material-icons-round">check_circle</span>
                        <span>Manage your bookings</span>
                    </div>
                    <div class="auth-feature">
                        <span class="material-icons-round">check_circle</span>
                        <span>View booking history</span>
                    </div>
                    <div class="auth-feature">
                        <span class="material-icons-round">check_circle</span>
                        <span>Quick check-in</span>
                    </div>
                </div>
            </div>

            <!-- Right Side - Login Form -->
            <div class="auth-form-section">
                <div class="auth-card">
                    <h2>Sign In</h2>
                    <p>Access your account</p>

                    <div class="alert-error" id="errorAlert"></div>

                    <form id="loginForm">
                        <div class="form-group-luxury">
                            <label>Email Address</label>
                            <div class="input-wrapper">
                                <span class="material-icons-round">email</span>
                                <input type="email" id="email" placeholder="your@email.com" required>
                            </div>
                        </div>

                        <div class="form-group-luxury">
                            <label>Password</label>
                            <div class="input-wrapper">
                                <span class="material-icons-round">lock</span>
                                <input type="password" id="password" placeholder="Enter your password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn-luxury" id="loginBtn">
                            <span class="material-icons-round">login</span>
                            <span id="loginText">Sign In</span>
                        </button>
                    </form>

                    <p class="auth-switch">
                        Don't have an account? <a href="register.html">Create Account</a>
                    </p>

                    <a href="index.html" class="back-home">
                        <span class="material-icons-round">arrow_back</span>
                        Back to Website
                    </a>

                    <div class="admin-link-login">
                        <a href="admin-login.html">Admin Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const errorAlert = document.getElementById('errorAlert');
            
            errorAlert.style.display = 'none';
            loginBtn.disabled = true;
            loginText.textContent = 'Signing in...';

            try {
                const response = await fetch(API + 'login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('user', JSON.stringify(result.user));
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    if (result.user.role === 'admin') {
                        localStorage.setItem('isAdmin', 'true');
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        localStorage.setItem('isAdmin', 'false');
                        window.location.href = 'index.html';
                    }
                } else {
                    errorAlert.textContent = result.error || 'Invalid email or password';
                    errorAlert.style.display = 'block';
                }
            } catch (error) {
                errorAlert.textContent = 'Cannot connect to server. Please start PHP server.';
                errorAlert.style.display = 'block';
            }

            loginBtn.disabled = false;
            loginText.textContent = 'Sign In';
        });
    </script>
</body>
</html>
