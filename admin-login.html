<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Luxury Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #c9a962, #a68b4b);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(201, 169, 98, 0.35);
        }

        .login-logo .material-icons-round {
            font-size: 40px;
            color: #1a1a2e;
        }

        .login-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #6b7280;
            font-size: 14px;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .material-icons-round {
            position: absolute;
            left: 16px;
            font-size: 20px;
            color: #9ca3af;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 50px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #c9a962;
            box-shadow: 0 0 0 4px rgba(201, 169, 98, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #c9a962, #a68b4b);
            color: #1a1a2e;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 169, 98, 0.45);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
            margin-top: 32px;
        }

        .back-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #c9a962;
        }

        .back-link .material-icons-round {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <span class="material-icons-round">admin_panel_settings</span>
                </div>
                <h1>Admin Portal</h1>
                <p>Hotel Management System</p>
            </div>

            <div class="alert-error" id="errorAlert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <span class="material-icons-round">email</span>
                        <input type="email" id="email" placeholder="admin@luxuryhotel.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="material-icons-round">lock</span>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="material-icons-round">login</span>
                    <span id="loginText">Sign In</span>
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">
                    <span class="material-icons-round">arrow_back</span>
                    Back to Website
                </a>
            </div>
        </div>
    </div>

    <script>
        const API = '';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const errorAlert = document.getElementById('errorAlert');
            
            errorAlert.style.display = 'none';
            loginBtn.disabled = true;
            loginText.textContent = 'Signing in...';

            try {
                const response = await fetch(API + 'login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success && result.user.role === 'admin') {
                    localStorage.setItem('user', JSON.stringify(result.user));
                    localStorage.setItem('isAdmin', 'true');
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'admin-dashboard.html';
                } else if (result.success && result.user.role !== 'admin') {
                    errorAlert.textContent = 'Access denied. Admin account required.';
                    errorAlert.style.display = 'block';
                } else {
                    errorAlert.textContent = result.error || 'Invalid credentials';
                    errorAlert.style.display = 'block';
                }
            } catch (error) {
                errorAlert.textContent = 'Cannot connect to server. Please check your connection.';
                errorAlert.style.display = 'block';
            }

            loginBtn.disabled = false;
            loginText.textContent = 'Sign In';
        });
    </script>
</body>
</html>
