<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Luxury Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            background: var(--primary);
        }

        .auth-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            min-height: 100vh;
        }

        .auth-image {
            position: relative;
            overflow: hidden;
        }

        .auth-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .auth-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(26,26,46,0.95), rgba(26,26,46,0.85));
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-overlay h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            color: var(--white);
            margin-bottom: 20px;
        }

        .auth-overlay p {
            color: var(--gray-400);
            font-size: 16px;
            margin-bottom: 40px;
        }

        .auth-feature {
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--gray-300);
            font-size: 15px;
            margin-bottom: 18px;
        }

        .auth-feature .material-icons-round {
            font-size: 22px;
            color: var(--gold);
        }

        .auth-form-section {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            padding: 60px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
        }

        .auth-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--white);
            margin-bottom: 8px;
        }

        .auth-card > p {
            color: var(--gray-400);
            margin-bottom: 32px;
        }

        .form-group-luxury {
            margin-bottom: 20px;
        }

        .form-group-luxury label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-300);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .material-icons-round {
            position: absolute;
            left: 16px;
            font-size: 20px;
            color: var(--gray-500);
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            font-size: 15px;
            color: var(--white);
            font-family: inherit;
            transition: var(--transition);
        }

        .input-wrapper input::placeholder {
            color: var(--gray-500);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(201, 169, 98, 0.08);
        }

        .form-row-luxury {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-luxury {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--primary);
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            transition: var(--transition);
        }

        .btn-luxury:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 169, 98, 0.45);
        }

        .auth-switch {
            text-align: center;
            color: var(--gray-400);
            font-size: 14px;
            margin-top: 24px;
        }

        .auth-switch a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }

        .back-home {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--gray-500);
            text-decoration: none;
            font-size: 14px;
            margin-top: 24px;
            transition: var(--transition);
        }

        .back-home:hover {
            color: var(--gold);
        }

        .alert-error, .alert-success {
            padding: 16px;
            border-radius: var(--radius);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.12);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.25);
            display: none;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.12);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.25);
            display: none;
        }

        @media (max-width: 1024px) {
            .auth-container {
                grid-template-columns: 1fr;
            }
            .auth-image {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <!-- Left Side -->
            <div class="auth-image">
                <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1200" alt="Hotel">
                <div class="auth-overlay">
                    <h1>Join Us</h1>
                    <p>Create an account to book rooms and manage reservations.</p>
                    <div class="auth-feature">
                        <span class="material-icons-round">check_circle</span>
                        <span>Book rooms instantly</span>
                    </div>
                    <div class="auth-feature">
                        <span class="material-icons-round">check_circle</span>
                        <span>Get exclusive deals</span>
                    </div>
                    <div class="auth-feature">
                        <span class="material-icons-round">check_circle</span>
                        <span>Easy booking management</span>
                    </div>
                </div>
            </div>

            <!-- Right Side - Register Form -->
            <div class="auth-form-section">
                <div class="auth-card">
                    <h2>Create Account</h2>
                    <p>Register as a guest</p>

                    <div class="alert-success" id="successAlert"></div>
                    <div class="alert-error" id="errorAlert"></div>

                    <form id="registerForm">
                        <div class="form-group-luxury">
                            <label>Full Name</label>
                            <div class="input-wrapper">
                                <span class="material-icons-round">person</span>
                                <input type="text" id="name" placeholder="John Smith" required>
                            </div>
                        </div>

                        <div class="form-row-luxury">
                            <div class="form-group-luxury">
                                <label>Email</label>
                                <div class="input-wrapper">
                                    <span class="material-icons-round">email</span>
                                    <input type="email" id="email" placeholder="john@example.com" required>
                                </div>
                            </div>

                            <div class="form-group-luxury">
                                <label>Phone</label>
                                <div class="input-wrapper">
                                    <span class="material-icons-round">phone</span>
                                    <input type="tel" id="phone" placeholder="+1 234 567 890" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-group-luxury">
                            <label>Password</label>
                            <div class="input-wrapper">
                                <span class="material-icons-round">lock</span>
                                <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6">
                            </div>
                        </div>

                        <div class="form-group-luxury">
                            <label>Confirm Password</label>
                            <div class="input-wrapper">
                                <span class="material-icons-round">lock</span>
                                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn-luxury" id="registerBtn">
                            <span class="material-icons-round">person_add</span>
                            <span id="registerText">Create Account</span>
                        </button>
                    </form>

                    <p class="auth-switch">
                        Already have an account? <a href="login.html">Sign In</a>
                    </p>

                    <a href="index.html" class="back-home">
                        <span class="material-icons-round">arrow_back</span>
                        Back to Website
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '';

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');
            const registerText = document.getElementById('registerText');
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            if (password !== confirmPassword) {
                errorAlert.textContent = 'Passwords do not match';
                errorAlert.style.display = 'block';
                return;
            }

            registerBtn.disabled = true;
            registerText.textContent = 'Creating account...';

            try {
                const response = await fetch(API + 'register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, password, role: 'customer' })
                });

                const result = await response.json();

                if (result.success) {
                    successAlert.textContent = 'Account created! Redirecting to login...';
                    successAlert.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorAlert.textContent = result.error || 'Registration failed';
                    errorAlert.style.display = 'block';
                }
            } catch (error) {
                errorAlert.textContent = 'Cannot connect to server. Please start PHP server.';
                errorAlert.style.display = 'block';
            }

            registerBtn.disabled = false;
            registerText.textContent = 'Create Account';
        });
    </script>
</body>
</html>
